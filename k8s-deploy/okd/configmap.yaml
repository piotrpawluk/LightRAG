apiVersion: v1
kind: ConfigMap
metadata:
  name: lightrag-config
  namespace: lightrag-prod
data:
  # Server Configuration
  HOST: "0.0.0.0"
  PORT: "9621"
  WORKERS: "4"
  LOG_LEVEL: "INFO"
  WORKSPACE: "redis_qwen3_workspace"

  # LLM Configuration
  LLM_BINDING: "openai"
  LLM_BINDING_HOST: "https://ml-llm-v-srv-v45-cp1-tst-node1.ai.warta.pl/v1"
  LLM_MODEL: "Qwen/Qwen3-Next-80B-A3B-Thinking"
  LLM_MAX_TOKENS: "4096"
  LLM_TEMPERATURE: "0.0"
  LLM_TOP_P: "0.9"
  LLM_TIMEOUT: "900"

  # Embedding Configuration
  EMBEDDING_BINDING: "openai"
  EMBEDDING_BINDING_HOST: "https://ml-ssm-l-srv-v16-cp2-tst-node5-llm-apps-tst.apps.ml.warta.pl/v1"
  EMBEDDING_MODEL: "Qwen3-Embedding-8B"
  EMBEDDING_DIM: "4096"
  EMBEDDING_MAX_TOKEN_SIZE: "8192"

  # Redis Configuration
  REDIS_USERNAME: "user2"
  REDIS_HOST: "ml-redisearch-vector-db-node5.shared-dev.svc.cluster.local"
  REDIS_PORT: "80"

  # Storage Configuration
  LIGHTRAG_KV_STORAGE: "RedisKVStorage"
  REDIS_KV_DB: "0"
  LIGHTRAG_DOC_STATUS_STORAGE: "RedisDocStatusStorage"
  REDIS_DOC_STATUS_DB: "1"
  LIGHTRAG_VECTOR_STORAGE: "RedisVectorStorage"
  REDIS_VECTOR_DB: "2"
  LIGHTRAG_GRAPH_STORAGE: "NetworkXStorage"

  # Redis HNSW Configuration
  REDIS_HNSW_M: "16"
  REDIS_HNSW_EF_CONSTRUCTION: "512"
  REDIS_MAX_CONNECTIONS: "100"
  REDIS_SOCKET_TIMEOUT: "30"
  REDIS_CONNECT_TIMEOUT: "10"
  REDIS_RETRY_ATTEMPTS: "3"

  # Working Directory
  WORKING_DIR: "/app/data"

  # Query Configuration
  DEFAULT_QUERY_MODE: "hybrid"
