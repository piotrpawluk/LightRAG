apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: lightrag
  namespace: lightrag-prod
  labels:
    app: lightrag
spec:
  to:
    kind: Service
    name: lightrag
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
