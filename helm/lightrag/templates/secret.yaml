apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lightrag.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lightrag.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  llm-api-key: {{ .Values.secrets.llmApiKey | quote }}
  embedding-api-key: {{ .Values.secrets.embeddingApiKey | quote }}
