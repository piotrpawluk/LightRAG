# Default values for lightrag Helm chart

# Image configuration
image:
  registry: artifactory.warta.pl
  repository: github-docker/piotrpawluk/lightrag
  # Use digest for immutable deployments
  digest: sha256:2b57d091de54e5d9b4c43f3531ce95fb6d18b9b97bbcbc5c81bd5cca7008f257
  pullPolicy: IfNotPresent
  platform: linux/amd64

# Number of replicas
# Note: NetworkXStorage requires ReadWriteMany PVC for >1 replica
# RedisGraphStorage supports multiple replicas out of the box
replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 9621
  annotations: {}

# OpenShift Route configuration
route:
  enabled: true
  host: ""  # Auto-generated by OKD if empty
  path: /
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

# Resource limits and requests
resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: 9621
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 9621
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# LightRAG application configuration
config:
  # Server settings
  server:
    host: "0.0.0.0"
    port: 9621
    workers: 4
    logLevel: INFO
    workspace: redis_qwen3_workspace
    workingDir: /app/data

  # LLM configuration (Qwen3-Next-80B-A3B-Thinking)
  llm:
    binding: openai
    host: https://ml-llm-v-srv-v45-cp1-tst-node1.ai.warta.pl/v1
    model: Qwen/Qwen3-Next-80B-A3B-Thinking
    maxTokens: 4096
    temperature: 0.0
    topP: 0.9
    timeout: 900

  # Embedding configuration (Qwen3-Embedding-8B)
  embedding:
    binding: openai
    host: https://ml-ssm-l-srv-v16-cp2-tst-node5-llm-apps-tst.apps.ml.warta.pl/v1
    model: Qwen3-Embedding-8B
    dimension: 4096
    maxTokenSize: 8192

  # Redis configuration
  redis:
    username: user2
    host: ml-redisearch-vector-db-node5.shared-dev.svc.cluster.local
    port: 80

  # Storage backend configuration
  storage:
    kv: RedisKVStorage
    kvDb: 0
    docStatus: RedisDocStatusStorage
    docStatusDb: 1
    vector: RedisVectorStorage
    vectorDb: 2
    graph: RedisGraphStorage  # NEW: Redis-based graph storage

  # Redis HNSW vector index configuration
  redisHnsw:
    m: 16
    efConstruction: 512
    maxConnections: 100
    socketTimeout: 30
    connectTimeout: 10
    retryAttempts: 3

  # Query configuration
  query:
    defaultMode: hybrid

# Secrets (OVERRIDE IN SEPARATE VALUES FILE FOR PRODUCTION)
# For production, use values-prod.yaml or external-secrets operator
secrets:
  redisPassword: "U6q7jeA9leOIwYMhAwZkPWRHw4SDmTGBMZXJXcsHlHW7oQUY"
  llmApiKey: "iAsmiqkLkU4e9fFf"
  embeddingApiKey: "pU68nMPXhWgXjnIQ"

# Security context (optional, uncomment for restricted environments)
# securityContext:
#   runAsNonRoot: true
#   runAsUser: 1000
#   fsGroup: 1000

# Node selector (optional)
nodeSelector: {}

# Tolerations (optional)
tolerations: []

# Affinity rules (optional)
affinity: {}
