# Redis Configuration for LightRAG
# Based on recommended settings from LightRAG documentation

# Persistence Configuration
# Save the DB to disk with the following rules:
# save <seconds> <changes>
# Save after 900 sec (15 min) if at least 1 key changed
save 900 1
# Save after 300 sec (5 min) if at least 10 keys changed
save 300 10
# Save after 60 sec if at least 1000 keys changed
save 60 1000

# Stop accepting writes if background save fails
stop-writes-on-bgsave-error yes

# Compress string objects using LZF when dump .rdb databases
rdbcompression yes

# Checksum the RDB file
rdbchecksum yes

# The filename where to dump the DB
dbfilename dump.rdb

# The working directory
dir /data

# Memory Management
maxmemory 4gb
maxmemory-policy noeviction

# Network Configuration
bind 0.0.0.0
port 6379
timeout 0

# Client Configuration
maxclients 500

# Logging
loglevel notice

# Enable AOF (Append Only File) for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Disable protected mode in Docker environment
protected-mode no
