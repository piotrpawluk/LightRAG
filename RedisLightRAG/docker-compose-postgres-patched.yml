version: '3.8'

# LightRAG with Full PostgreSQL Storage + Patched OpenAI Client
# Fixes OpenAI client v1.109.1 compatibility issues with internal APIs

services:
  # PostgreSQL with PGVector and AGE extensions (Public Image)
  postgres:
    image: ghcr.io/piotrpawluk/postgres-pgvector-age:latest
    container_name: lightrag-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=lightrag
      - POSTGRES_PASSWORD=lightrag_secure_password
      - POSTGRES_DB=lightrag
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LightRAG server with patched OpenAI client
  lightrag:
    build:
      context: .
      dockerfile: Dockerfile.lightrag-patched
    image: lightrag-patched:latest
    container_name: lightrag-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9621:9621"
    volumes:
      - lightrag-data:/app/data
      - ./lightrag_config:/app/config
    environment:
      # ============================================
      # Server Configuration
      # ============================================
      - HOST=0.0.0.0
      - PORT=9621
      - WORKERS=4
      - LOG_LEVEL=INFO

      # ============================================
      # Workspace
      # ============================================
      - WORKSPACE=postgres_workspace

      # ============================================
      # LLM Configuration - Internal Warta API
      # ============================================
      - LLM_BINDING=openai
      - LLM_BINDING_HOST=https://ml-llm-v-srv-v45-cp1-tst-node1.ai.warta.pl
      - LLM_BINDING_API_KEY=iAsmiqkLkU4e9fFf
      - LLM_MODEL=Qwen/Qwen3-Next-80B-A3B-Thinking
      - LLM_MAX_TOKENS=4096
      - LLM_TEMPERATURE=0.0
      - LLM_TOP_P=0.9
      - LLM_TIMEOUT=900

      # ============================================
      # Embedding Configuration - Internal Warta API
      # ============================================
      - EMBEDDING_BINDING=openai
      - EMBEDDING_BINDING_HOST=https://ml-ssm-l-srv-v16-cp2-tst-node5-llm-apps-tst.apps.ml.warta.pl
      - EMBEDDING_BINDING_API_KEY=pU68nMPXhWgXjnIQ
      - EMBEDDING_MODEL=Qwen3-Embedding-8B
      - EMBEDDING_DIM=4096
      - EMBEDDING_MAX_TOKEN_SIZE=8192

      # ============================================
      # Storage Configuration - ALL POSTGRESQL
      # ============================================

      # PostgreSQL Connection
      - POSTGRES_HOST=lightrag-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=lightrag
      - POSTGRES_PASSWORD=lightrag_secure_password
      - POSTGRES_DATABASE=lightrag

      # KV Storage - PostgreSQL
      - LIGHTRAG_KV_STORAGE=PGKVStorage

      # Document Status Storage - PostgreSQL
      - LIGHTRAG_DOC_STATUS_STORAGE=PGDocStatusStorage

      # Vector Storage - PostgreSQL with PGVector
      - LIGHTRAG_VECTOR_STORAGE=PGVectorStorage

      # Graph Storage - PostgreSQL with Apache AGE Extension
      - LIGHTRAG_GRAPH_STORAGE=PGGraphStorage

      # ============================================
      # Working Directory
      # ============================================
      - WORKING_DIR=/app/data

      # ============================================
      # Query Configuration
      # ============================================
      - DEFAULT_QUERY_MODE=hybrid

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9621/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    driver: local
  lightrag-data:
    driver: local

networks:
  default:
    name: lightrag-network
